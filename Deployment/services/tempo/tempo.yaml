server:
  http_listen_port: 3200
  log_level: info

stream_over_http_enabled: true

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  flush_check_period: 10s
  max_block_duration: 5m
  flush_all_on_shutdown: true

query_frontend:
  max_retries: 2
  search:
    concurrent_jobs: 256
    target_bytes_per_job: 104857600
    default_result_limit: 50
    max_result_limit: 5000
    max_duration: 168h
    query_backend_after: 15m
  trace_by_id:
    query_shards: 50
    concurrent_shards: 20
  metrics:
    concurrent_jobs: 256
    target_bytes_per_job: 104857600
    max_duration: 6h
    query_backend_after: 15m

querier:
  max_concurrent_queries: 20
  trace_by_id:
    query_timeout: 10s
  search:
    query_timeout: 30s

compactor:
  compaction:
    block_retention: 720h
    compacted_block_retention: 1h
    compaction_window: 1h

metrics_generator:
  ring:
    kvstore:
      store: inmemory
  registry:
    collection_interval: 15s
    stale_duration: 15m
    external_labels:
      source: tempo
      cluster: docker-compose
      deployment_environment: dev
  storage:
    path: /var/tempo/generator/wal
    remote_write_flush_deadline: 1m
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
        remote_timeout: 30s
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    service_graphs:
      wait: 10s
      max_items: 10000
      workers: 4
      dimensions:
        - service.namespace
        - deployment.environment.name
    span_metrics:
      enable_target_info: true
      target_info_excluded_dimensions:
        - service.instance.id
      dimensions:
        - service.namespace
        - deployment.environment.name
    local_blocks:
      filter_server_spans: false
      flush_to_storage: true
      max_block_duration: 1m
      complete_block_timeout: 20m
  metrics_ingestion_time_range_slack: 30s
  query_timeout: 30s

storage:
  trace:
    backend: local
    blocklist_poll: 5m
    pool:
      max_workers: 100
      queue_depth: 10000
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
        - local-blocks
      generate_native_histograms: both
