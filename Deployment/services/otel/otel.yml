receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

  resource/defaults:
    attributes:
      - action: insert
        key: service.namespace
        value: learn-dot-net
      - action: insert
        key: deployment.environment.name
        value: dev

  transform/metrics:
    error_mode: ignore
    metric_statements:
      - context: metric
        statements:
          - set(description, "") where name == "queueSize"
          - set(description, "") where name == "rpc.server.duration"

  batch:
    timeout: 1s
    send_batch_size: 8192
    send_batch_max_size: 10000

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    sending_queue:
      enabled: true
      queue_size: 4096
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 5m

  # Requires Loki 3.0+; this replaces the legacy Loki exporter with native OTLP log ingestion.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    sending_queue:
      enabled: true
      queue_size: 4096
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 5m

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [ health_check ]
  pipelines:
    traces:
      receivers: [ otlp ]
      processors: [ memory_limiter, resource/defaults, batch ]
      exporters: [ otlp/tempo ]

    metrics:
      receivers: [ otlp ]
      processors: [ memory_limiter, resource/defaults, transform/metrics, batch ]
      exporters: [ prometheus ]

    logs:
      receivers: [ otlp ]
      processors: [ memory_limiter, resource/defaults, batch ]
      exporters: [ otlphttp/loki ]

  telemetry:
    resource:
      service.name: otel-collector
      service.namespace: learn-dot-net
      deployment.environment.name: dev
    metrics:
      # Collector v0.123+ ignores metrics.address; readers keeps the scrape endpoint explicit.
      level: normal
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
                without_type_suffix: true
                without_units: true
    logs:
      level: INFO

file_format: yaml
