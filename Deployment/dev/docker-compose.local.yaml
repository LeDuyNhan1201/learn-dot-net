x-observability-logging: &observability-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE}"
    max-file: "${DOCKER_LOG_MAX_FILE}"

x-observability-service: &observability-service
  restart: unless-stopped
  init: true
  user: "${OBSERVABILITY_UID}:${OBSERVABILITY_GID}"
  security_opt:
    - no-new-privileges:true
  logging: *observability-logging

services:
  # --------- Envoy ---------
  gateway:
    image: envoyproxy/envoy:${ENVOY_TAG:-latest}
    container_name: gateway
    ports:
      - "${GATEWAY_PORT}:443"
      - "${GATEWAY_ADMIN_PORT}:9001"
    networks:
      - local-network
      - local-observability-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml"]
    volumes:
      - ${SERVICES_DIR}/envoy/gateway.local.yaml:/etc/envoy/envoy.yaml:ro
      - ./certs/gateway:/etc/envoy/certificates:ro

  # --------- Observability ---------
  loki:
    <<: *observability-service
    image: grafana/loki:${LOKI_TAG}
    container_name: loki
    command: ["-config.file=/etc/loki/loki.yaml"]
    networks:
      - local-observability-network
    volumes:
      - ${SERVICES_DIR}/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - ${LOKI_DATA_DIR}:/loki

  tempo:
    <<: *observability-service
    image: grafana/tempo:${TEMPO_TAG}
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    networks:
      - local-observability-network
    volumes:
      - ${SERVICES_DIR}/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - ${TEMPO_DATA_DIR}:/var/tempo
    depends_on:
      prometheus:
        condition: service_started

  otel-collector:
    <<: *observability-service
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_TAG}
    container_name: otel-collector
    command: ["--config=/etc/otelcol-contrib/otel.yml"]
    ports:
      - "${OTEL_COLLECTOR_OTLP_GRPC_PORT}:4317"
    networks:
      - local-network
      - local-observability-network
    volumes:
      - ${SERVICES_DIR}/otel/otel.yml:/etc/otelcol-contrib/otel.yml:ro
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started

  prometheus:
    <<: *observability-service
    image: prom/prometheus:${PROMETHEUS_TAG}
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE}
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    networks:
      - local-observability-network
    volumes:
      - ${SERVICES_DIR}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${PROMETHEUS_DATA_DIR}:/prometheus

  grafana:
    <<: *observability-service
    image: grafana/grafana:${GRAFANA_TAG}
    container_name: grafana
    networks:
      - local-observability-network
    volumes:
      - ${SERVICES_DIR}/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${SERVICES_DIR}/grafana/dashboards:/etc/grafana/dashboards:ro
      - ${SERVICES_DIR}/certs/ca/ca.crt:/usr/local/share/ca-certificates/ca.crt:ro
      - ${GRAFANA_DATA_DIR}:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    environment:
      GF_SERVER_ROOT_URL: https://${APP_HOSTNAME}:${GATEWAY_PORT}/observability
      GF_SERVER_SERVE_FROM_SUB_PATH: true
      GF_SERVER_HTTP_PORT: 3000
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_METRICS_ENABLED: "true"
      GF_LOG_MODE: console

networks:
  local-network:
    driver: bridge
  local-observability-network:
    driver: bridge
