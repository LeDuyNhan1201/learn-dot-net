x-observability-logging: &observability-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE}"
    max-file: "${DOCKER_LOG_MAX_FILE}"

x-observability-service: &observability-service
  restart: unless-stopped
  init: true
  user: "${OBSERVABILITY_UID}:${OBSERVABILITY_GID}"
  security_opt:
    - no-new-privileges:true
  logging: *observability-logging

services:
  # --------- Envoy ---------
  gateway:
    image: dhi.io/envoy:${ENVOY_TAG:-latest}
    container_name: gateway
    ports:
      - "${GATEWAY_PORT}:443"
      - "${GATEWAY_ADMIN_PORT}:9001"
    networks:
      - local-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml"]
    volumes:
      - ./envoy/gateway.local.yaml:/etc/envoy/envoy.yaml:ro
      - ./certs/gateway:/etc/envoy/certificates:ro

  # --------- Observability ---------
  loki:
    <<: *observability-service
    image: dhi.io/loki:${LOKI_TAG}
    container_name: loki
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "${LOKI_PORT}:3100"
    networks:
      - observability-network
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml:ro
      - ${LOKI_DATA_DIR}:/loki
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tempo:
    <<: *observability-service
    image: dhi.io/tempo:${TEMPO_TAG}
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "${TEMPO_PORT}:3200"
    networks:
      - observability-network
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - ${TEMPO_DATA_DIR}:/var/tempo
    depends_on:
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD", "/tempo", "-version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  otel-collector:
    <<: *observability-service
    image: dhi.io/opentelemetry-collector:${OTEL_COLLECTOR_TAG}
    container_name: otel-collector
    command: ["--config=/etc/otelcol-contrib/otel.yml"]
    ports:
      - "${OTEL_COLLECTOR_OTLP_GRPC_PORT}:4317"
      - "${OTEL_COLLECTOR_OTLP_HTTP_PORT}:4318"
      - "${OTEL_COLLECTOR_HEALTH_PORT}:13133"
    networks:
      - local-network
      - observability-network
    volumes:
      - ./otel/otel.yml:/etc/otelcol-contrib/otel.yml:ro
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    <<: *observability-service
    image: dhi.io/prometheus:${PROMETHEUS_TAG}
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE}
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    ports:
      - "${PROMETHEUS_PORT}:${PROMETHEUS_CONTAINER_PORT}"
    networks:
      - observability-network
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${PROMETHEUS_DATA_DIR}:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  grafana:
    <<: *observability-service
    image: dhi.io/grafana:${GRAFANA_TAG}
    container_name: grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    networks:
      - observability-network
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - ${GRAFANA_DATA_DIR}:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    environment:
      GF_SERVER_ROOT_URL: https://${APP_HOSTNAME}/observability
      GF_SERVER_SERVE_FROM_SUB_PATH: true
      GF_SERVER_HTTP_PORT: 3000
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_METRICS_ENABLED: "true"
      GF_LOG_MODE: console
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  local-network:
    driver: bridge
  observability-network:
    driver: bridge
