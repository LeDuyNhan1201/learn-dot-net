apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "learn-dot-net.backendName" . }}
  namespace: {{ include "learn-dot-net.namespace" . }}
  labels:
    {{- include "learn-dot-net.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "learn-dot-net.backendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "learn-dot-net.backendSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "learn-dot-net.backendName" . }}
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.containerPort }}
          env:
            {{- range $name, $value := .Values.backend.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
