services:
  # --------- Envoy ---------
  api-gateway:
    image: envoyproxy/envoy:${ENVOY_TAG:-latest}
    container_name: api-gateway
    ports:
      - "${GATEWAY_PORT}:443"
      - "9901:9901"
    networks:
      - local-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: [ "envoy", "-c", "/etc/envoy/envoy.yaml" ]
    volumes:
      - ./envoy/api-gateway.local.yaml:/etc/envoy/envoy.yaml
      - ./certs/api-gateway:/etc/envoy/certificates
  
networks:
  local-network:
    driver: bridge

