{{- if .Values.secret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backend.fullname" . }}-secret
  namespace: {{ include "backend.namespace" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secret.stringData }}
  {{- toYaml . | nindent 2 }}
  {{- else }}
  {}
  {{- end }}
{{- end }}
