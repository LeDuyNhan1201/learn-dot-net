namespace:
  create: false
  name: learn-dot-net

nameOverride: ""
fullnameOverride: backend

replicaCount: 1

image:
  repository: leduynhan1201/learn-dot-net/backend
  tag: "1.0.0"
  pullPolicy: Never

containerPort: 60001

env:
  ASPNETCORE_ENVIRONMENT: Development

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 60001

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: backend.learn-dot-net.dev
      paths:
        - path: /
          pathType: Prefix
  tls: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null

config:
  enabled: false
  data: {}

secret:
  enabled: false
  stringData: {}

resources: {}
podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
