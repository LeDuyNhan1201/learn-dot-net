global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: docker-compose
    deployment_environment: dev

scrape_configs:
  - job_name: otel-collector-metrics
    honor_timestamps: true
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          component: otel-collector
          signal: otlp-metrics
    relabel_configs:
      - target_label: service_namespace
        replacement: learn-dot-net
      - target_label: deployment_environment
        replacement: dev

  - job_name: otel-collector-internal
    honor_timestamps: true
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          component: otel-collector
          signal: internal
    relabel_configs:
      - target_label: service_namespace
        replacement: learn-dot-net
      - target_label: deployment_environment
        replacement: dev

  - job_name: prometheus
    honor_timestamps: true
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          component: prometheus

  - job_name: loki
    honor_timestamps: true
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["loki:3100"]
        labels:
          component: loki

  - job_name: tempo
    honor_timestamps: true
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          component: tempo

  - job_name: grafana
    honor_timestamps: true
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          component: grafana

# Tempo metrics-generator remote write requires Prometheus to start with --web.enable-remote-write-receiver.
tracing:
  endpoint: otel-collector:4317
  insecure: true
  timeout: 5s
