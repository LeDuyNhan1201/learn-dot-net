x-observability-logging: &observability-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE}"
    max-file: "${DOCKER_LOG_MAX_FILE}"

x-observability-service: &observability-service
  restart: unless-stopped
  init: true
  user: "${OBSERVABILITY_UID}:${OBSERVABILITY_GID}"
  security_opt:
    - no-new-privileges:true
  logging: *observability-logging

services:
  # --------- Envoy ---------
  api-gateway:
    image: envoyproxy/envoy:${ENVOY_TAG:-latest}
    container_name: ${API_GATEWAY_CONTAINER_NAME}
    ports:
      - "${GATEWAY_PORT}:${API_GATEWAY_HTTPS_PORT}"
      - "${API_GATEWAY_ADMIN_PORT}:${API_GATEWAY_ADMIN_PORT}"
    networks:
      - dev-network
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml"]
    volumes:
      - ./envoy/api-gateway.yaml:/etc/envoy/envoy.yaml:ro
      - ./certs/api-gateway:/etc/envoy/certificates:ro

  backend:
    image: ${NAMESPACE}/${REPOSITORY_NAME}/backend:${BACKEND_TAG}
    container_name: ${BACKEND_CONTAINER_NAME}
    ports:
      - "${BACKEND_CONTAINER_PORT}:${BACKEND_CONTAINER_PORT}"
    networks:
      - dev-network
    depends_on:
      otel-collector:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      OTEL_SERVICE_NAME: ${BACKEND_CONTAINER_NAME}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:${OTEL_COLLECTOR_OTLP_GRPC_PORT}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=${REPOSITORY_NAME},deployment.environment.name=${MODE},service.version=${BACKEND_TAG}

  # --------- Observability ---------
  loki:
    <<: *observability-service
    image: grafana/loki:${LOKI_TAG}
    container_name: ${LOKI_CONTAINER_NAME}
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "${LOKI_PORT}:${LOKI_CONTAINER_PORT}"
    networks:
      - observability-network
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml:ro
      - ${LOKI_DATA_DIR}:/loki
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tempo:
    <<: *observability-service
    image: grafana/tempo:${TEMPO_TAG}
    container_name: ${TEMPO_CONTAINER_NAME}
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "${TEMPO_PORT}:${TEMPO_CONTAINER_PORT}"
    networks:
      - observability-network
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - ${TEMPO_DATA_DIR}:/var/tempo
    depends_on:
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD", "/tempo", "-version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  otel-collector:
    <<: *observability-service
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_TAG}
    container_name: ${OTEL_COLLECTOR_CONTAINER_NAME}
    command: ["--config=/etc/otelcol-contrib/otel.yml"]
    ports:
      - "${OTEL_COLLECTOR_OTLP_GRPC_PORT}:${OTEL_COLLECTOR_OTLP_GRPC_PORT}"
      - "${OTEL_COLLECTOR_OTLP_HTTP_PORT}:${OTEL_COLLECTOR_OTLP_HTTP_PORT}"
      - "${OTEL_COLLECTOR_HEALTH_PORT}:${OTEL_COLLECTOR_HEALTH_PORT}"
    networks:
      - dev-network
      - observability-network
    volumes:
      - ./otel/otel.yml:/etc/otelcol-contrib/otel.yml:ro
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    <<: *observability-service
    image: prom/prometheus:${PROMETHEUS_TAG}
    container_name: ${PROMETHEUS_CONTAINER_NAME}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE}
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    ports:
      - "${PROMETHEUS_PORT}:${PROMETHEUS_CONTAINER_PORT}"
    networks:
      - observability-network
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${PROMETHEUS_DATA_DIR}:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  grafana:
    <<: *observability-service
    image: grafana/grafana:${GRAFANA_TAG}
    container_name: ${GRAFANA_CONTAINER_NAME}
    ports:
      - "${GRAFANA_PORT}:${GRAFANA_CONTAINER_PORT}"
    networks:
      - observability-network
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - ${GRAFANA_DATA_DIR}:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    environment:
      GF_SERVER_HTTP_PORT: ${GRAFANA_CONTAINER_PORT}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_METRICS_ENABLED: "true"
      GF_LOG_MODE: console
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  dev-network:
    driver: bridge
  observability-network:
    driver: bridge
